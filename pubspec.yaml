name: novaishop_mobile
description: Autonomous Flutter mobile app for the NovAiShop marketplace.
publish_to: none
version: 0.1.4+4

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.4
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  shorebird_code_push: ^2.0.6
  supabase_flutter: ^2.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - shorebird.yaml
  uses-material-design: true
