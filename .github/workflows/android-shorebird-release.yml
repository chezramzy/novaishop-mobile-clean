name: Android Shorebird Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to publish, for example v0.1.6-test
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build patchable Android APK
    runs-on: ubuntu-latest
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
      SHOREBIRD_APP_ID: ${{ vars.SHOREBIRD_APP_ID }}
      FLUTTER_VERSION: "3.41.6"
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Shorebird configuration
        shell: bash
        run: |
          test -n "$SHOREBIRD_TOKEN" || {
            echo "Missing repository secret SHOREBIRD_TOKEN";
            exit 1;
          }
          test -n "$SHOREBIRD_APP_ID" || {
            echo "Missing repository variable SHOREBIRD_APP_ID";
            exit 1;
          }
          test -n "$ANDROID_KEYSTORE_BASE64" || {
            echo "Missing repository secret ANDROID_KEYSTORE_BASE64";
            exit 1;
          }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || {
            echo "Missing repository secret ANDROID_KEYSTORE_PASSWORD";
            exit 1;
          }
          test -n "$ANDROID_KEY_ALIAS" || {
            echo "Missing repository secret ANDROID_KEY_ALIAS";
            exit 1;
          }
          test -n "$ANDROID_KEY_PASSWORD" || {
            echo "Missing repository secret ANDROID_KEY_PASSWORD";
            exit 1;
          }
          cat > shorebird.yaml <<EOF
          app_id: $SHOREBIRD_APP_ID
          auto_update: true
          EOF
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Fetch dependencies
        run: shorebird flutter pub get

      - name: Analyze
        run: shorebird flutter analyze

      - name: Test
        run: shorebird flutter test

      - name: Shorebird Android release
        id: shorebird-release
        uses: shorebirdtech/shorebird-release@v1
        with:
          args: --artifact apk
          flutter-version: ${{ env.FLUTTER_VERSION }}
          platform: android
          working-directory: .

      - name: Rename APK
        shell: bash
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "NovaShop-${{ inputs.release_tag }}-shorebird.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: NovaShop Android ${{ inputs.release_tag }}
          body: |
            Shorebird patchable Android release.

            Shorebird release version: ${{ steps.shorebird-release.outputs.release-version }}
          files: NovaShop-${{ inputs.release_tag }}-shorebird.apk
