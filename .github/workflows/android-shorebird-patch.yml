name: Android Shorebird Patch

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Shorebird release version to patch, or latest
        required: true
        default: latest
        type: string

permissions:
  contents: read

jobs:
  patch:
    name: Publish Android patch
    runs-on: ubuntu-latest
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
      SHOREBIRD_APP_ID: ${{ vars.SHOREBIRD_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Shorebird configuration
        shell: bash
        run: |
          test -n "$SHOREBIRD_TOKEN" || {
            echo "Missing repository secret SHOREBIRD_TOKEN";
            exit 1;
          }
          test -n "$SHOREBIRD_APP_ID" || {
            echo "Missing repository variable SHOREBIRD_APP_ID";
            exit 1;
          }
          cat > shorebird.yaml <<EOF
          app_id: $SHOREBIRD_APP_ID
          auto_update: false
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Fetch dependencies
        run: shorebird flutter pub get

      - name: Analyze
        run: shorebird flutter analyze

      - name: Test
        run: shorebird flutter test

      - name: Shorebird Android patch
        id: shorebird-patch
        uses: shorebirdtech/shorebird-patch@v1
        with:
          platform: android
          release-version: ${{ inputs.release_version }}
          working-directory: .

      - name: Patch summary
        run: echo "Published patch ${{ steps.shorebird-patch.outputs.patch-number }}"
